# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - user-dashboard-axara-app

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies and Build
        env:
          DATABASE_URL: "libsql://dummy-url-for-build-only.turso.io" 
          TURSO_AUTH_TOKEN: "dummy-token"
        run: |
          npm ci
          npm run build

      - name: Prepare and ZIP standalone deployment
        run: |
          # 1. Siapkan folder sementara
          mkdir -p deploy_package
          
          # 2. Salin semua file dari output standalone Next.js
          cp -a .next/standalone/. deploy_package/
          cp -a .next/static deploy_package/.next/
          cp -a public deploy_package/
          
          # 3. KUNCI JAWABANNYA DI SINI: Kita zip manual!
          cd deploy_package
          zip -r ../deploy.zip .

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy.zip 

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_8207662BA3BA4CA585B5B08F20730115 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_8FF41F2905CC42EAB7AAC9D2A8C680D1 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_E5CDAFF142F7419282D54B1B1E4B230D }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'user-dashboard-axara-app'
          slot-name: 'Production'
          package: deploy.zip